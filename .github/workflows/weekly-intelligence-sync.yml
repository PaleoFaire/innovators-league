name: Weekly Intelligence Sync

# Runs every Sunday at 08:00 UTC — after Saturday's news aggregation catches
# up with end-of-week developments. Synthesizes 7 days of events across 11
# feeds into updated Frontier Index scores and a weekly digest.

on:
  schedule:
    - cron: '0 8 * * 0'   # Sundays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-weekly-metrics:
    name: Synthesize week + update scores
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil youtube-transcript-api

      - name: Run weekly intelligence sync
        run: python scripts/sync_weekly_metrics.py
        continue-on-error: false

      # Round 7l — Proprietary metrics refresh
      # Each script is independent and produces a data/*_auto.json file.
      # emit_round7l_auto_js.py then wraps each as a browser-ready data/*_auto.js.
      - name: Pull Substack field notes
        run: python scripts/fetch_substack_posts.py
        continue-on-error: true

      - name: Calc Budget Signals (sector activity index)
        run: python scripts/calc_budget_signals.py
        continue-on-error: true

      - name: Calc Fund Intelligence (platform stats + top funds)
        run: python scripts/calc_fund_intelligence.py
        continue-on-error: true

      - name: Calc M&A comps (news + press + SEC 8-K)
        run: python scripts/calc_ma_comps.py
        continue-on-error: true

      - name: Calc Founder Mafias (prior-employer clusters)
        run: python scripts/calc_founder_mafias.py
        continue-on-error: true

      - name: Calc Network Graph (competitor + thesis + alumni edges)
        run: python scripts/calc_network_graph.py
        continue-on-error: true

      - name: Calc Contractor Readiness (gov-contract weighted scores)
        run: python scripts/calc_contractor_readiness.py
        continue-on-error: true

      - name: Calc Gov Demand Summary (sector aggregations)
        run: python scripts/calc_gov_demand_summary.py
        continue-on-error: true

      - name: Calc Expert Takes (earnings + high-impact news)
        run: python scripts/calc_expert_takes.py
        continue-on-error: true

      - name: Verify Company Metadata (rebrands, IPOs, acquisitions)
        # Catches the category of issue that no other pipeline catches:
        # a tracked company changed its name, went public, got acquired,
        # or shut down. Desk-checks are always on; --probe makes weekly
        # HEAD requests to every company website (caps at 200 for cost).
        # Writes data/metadata_verification.json for the admin dashboard.
        run: python scripts/verify_company_metadata.py --probe --limit 200
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════════
      # NEW PIPELINES — Round 8 · Crown-Jewel Intelligence
      # Each writes its own _auto.json + _auto.js file. All have graceful
      # fallbacks so workflow never fails on upstream flakiness.
      # ═══════════════════════════════════════════════════════════════

      - name: Power Grid — FERC/ISO Interconnection Queue
        # Crown jewel. Aggregates PJM/MISO/ERCOT/CAISO/SPP/NYISO/ISO-NE
        # queue filings. Reveals every data-center + SMR + gigafactory
        # buildout 18-36 months before groundbreaking press.
        run: python scripts/fetch_interconnection_queue.py
        continue-on-error: true

      - name: Website Change Detection (Wayback CDX)
        # HEADs every tracked company's homepage via Wayback CDX and
        # diffs content hashes. Catches exec departures / pivots /
        # customer wins before announcements.
        run: python scripts/fetch_website_changes.py
        continue-on-error: true

      - name: FCC Spectrum + Experimental Radio Licenses
        # Every satellite downlink / drone C2 / autonomous radar filing
        # is public. ELS filings precede product launches by 6-12 months.
        run: python scripts/fetch_fcc_licenses.py
        continue-on-error: true

      - name: H-1B LCA Hiring Signal (DOL OFLC)
        # Job titles + wages + worksites from public H-1B filings —
        # reveals what a company is actually building beyond headcount.
        run: python scripts/fetch_h1b_lca.py
        continue-on-error: true

      - name: DSCA Foreign Military Sales Notifications
        # Defense tech as named subs in foreign arms packages; geographic
        # demand signal (UAE, Taiwan, Saudi) — relevant to SAVI/ADIO.
        run: python scripts/fetch_dsca_fms.py
        continue-on-error: true

      - name: Senate LDA Lobbying Disclosure Tracker
        # Quarterly lobbying spend trend per company. Acceleration is a
        # leading indicator of regulatory/commercial traction.
        run: python scripts/fetch_lobbying.py
        continue-on-error: true

      - name: YouTube Corporate Caption Mentions
        # Auto-captions from NVIDIA GTC, Tesla AI Day, SpaceX launches,
        # Figure demos, All-In, 20VC, Acquired, Dwarkesh, BG2, Lex podcasts.
        # NER-matches against 868 tracked companies.
        run: python scripts/fetch_youtube_mentions.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        continue-on-error: true

      # ═══════════════════════════════════════════════════════════════
      # Round 9 — Supply Chain + Regulatory Depth + Hedge Fund Skill
      # ═══════════════════════════════════════════════════════════════

      - name: US Customs Bill of Lading (ImportYeti)
        # Supply-chain ground truth — detect manufacturing ramp and
        # risk-country supplier concentration for hardware companies.
        run: python scripts/fetch_bill_of_lading.py
        continue-on-error: true

      - name: State PUC Dockets (TX / CA / AZ / NV / OH / WY / ID)
        # Large-load applications that surface in state PUC dockets
        # BEFORE FERC queue filings. Texas SB 6 (2025) makes every
        # >75 MW interconnection a docket filing.
        run: python scripts/fetch_state_puct_dockets.py
        continue-on-error: true

      - name: EPA NPDES + State Water Permits
        # Fab + data center + lithium brine water permits. 12-24 months
        # of lead-time visibility into large industrial buildouts.
        run: python scripts/fetch_water_permits.py
        continue-on-error: true

      - name: Earnings Call Deception Detector (Skill)
        # The direct hedge fund pattern — Larcker & Zakolyukina 2010
        # linguistic scoring of public frontier-tech earnings calls.
        run: python scripts/skill_deception_detector.py
        continue-on-error: true

      - name: Emit Round 7l auto.js bundles
        run: python scripts/emit_round7l_auto_js.py

      - name: Regenerate weekly brief (picks up fresh Frontier movers)
        run: python scripts/generate_weekly_brief.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          BRIEF_WEBHOOK_SECRET: ${{ secrets.BRIEF_WEBHOOK_SECRET }}
        continue-on-error: true

      - name: Inspect digest
        run: |
          if [ -f data/weekly_scoring_digest.json ]; then
            echo "=== Digest summary ==="
            python3 -c "
          import json
          d = json.load(open('data/weekly_scoring_digest.json'))
          print(f\"Week ending: {d['week_ending']}\")
          print(f\"Events processed: {d['events_processed']}\")
          print(f\"Companies touched: {d['companies_touched']}\")
          print(f\"Movers up: {len(d['movers_up_top20'])}\")
          print(f\"Movers down: {len(d['movers_down_top10'])}\")
          print(f\"Top headlines: {len(d['top_headlines'])}\")
          print()
          print('Top 5 up:')
          for m in d['movers_up_top20'][:5]:
              print(f\"  {m['company']:25s}  {m['old_composite']:.1f} → {m['new_composite']:.1f}  (+{m['delta']:.1f})\")
          print()
          print('Top headlines:')
          for h in d['top_headlines'][:10]:
              print(f\"  [{h['type']:20s}] {h['company']}: {h['detail'][:80]}\")
          "
          fi

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push (robust stash-rebase-pop pattern)
        # Uses the same stash-rebase-pop-commit-soft-reset pattern that
        # weekly-extended-sync.yml uses. The previous version did:
        #   git push; if fail: git pull --rebase || true; retry
        # That swallowed rebase failures silently — when concurrent runs
        # touched any of the auto.js files, rebase aborted, the push
        # repeatedly failed, and the workflow ran for 23 minutes before
        # exiting with code 1. (Same root-cause family as the data.js
        # conflict-marker bug from the previous round.)
        run: |
          # Pre-commit conflict marker guard — refuse to ship any file
          # that contains an unresolved <<<<<<< / ======= / >>>>>>> marker.
          # Caught by the regression that broke the homepage in Apr 2026.
          if grep -RIlE '^<{7}|^>{7}|^={7}$' data.js data/ 2>/dev/null | head -1 | grep -q .; then
            echo "::error::Conflict markers detected in tracked files. Refusing to commit."
            grep -RIlE '^<{7}|^>{7}|^={7}$' data.js data/ 2>/dev/null
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main || {
              echo "Rebase failed on attempt $attempt; aborting cleanly"
              git rebase --abort 2>/dev/null || true
            }
            git stash pop 2>/dev/null || true
            git add data.js data/weekly_scoring_digest.json \
                    data/weekly_history.json \
                    data/weekly_brief_movers.json \
                    data/weekly_brief.json \
                    data/metadata_verification.json \
                    data/interconnection_queue_auto.json data/interconnection_queue_auto.js \
                    data/website_changes_auto.json data/website_changes_auto.js \
                    data/fcc_licenses_auto.json data/fcc_licenses_auto.js \
                    data/h1b_lca_auto.json data/h1b_lca_auto.js \
                    data/dsca_fms_auto.json data/dsca_fms_auto.js \
                    data/lobbying_auto.json data/lobbying_auto.js \
                    data/youtube_mentions_auto.json data/youtube_mentions_auto.js \
                    data/bill_of_lading_auto.json data/bill_of_lading_auto.js \
                    data/state_puct_dockets_auto.json data/state_puct_dockets_auto.js \
                    data/water_permits_auto.json data/water_permits_auto.js \
                    data/deception_scores_auto.json data/deception_scores_auto.js \
                    data/field_notes_auto.json data/field_notes_auto.js \
                    data/budget_signals_auto.json data/budget_signals_auto.js \
                    data/fund_intelligence_auto.json data/fund_intelligence_auto.js \
                    data/ma_comps_auto.json data/ma_comps_auto.js \
                    data/founder_mafias_auto.json data/founder_mafias_auto.js \
                    data/network_graph_auto.json data/network_graph_auto.js \
                    data/contractor_readiness_auto.json data/contractor_readiness_auto.js \
                    data/gov_demand_summary_auto.json data/gov_demand_summary_auto.js \
                    data/expert_takes_auto.json data/expert_takes_auto.js \
                    2>/dev/null || true

            # Re-check conflict markers AFTER stash pop — the rebase may
            # have introduced them when merging concurrent auto.js writes.
            if grep -RIlE '^<{7}|^>{7}|^={7}$' data.js data/ 2>/dev/null | head -1 | grep -q .; then
              echo "::error::Conflict markers introduced by rebase on attempt $attempt"
              grep -RIlE '^<{7}|^>{7}|^={7}$' data.js data/ 2>/dev/null
              # Don't push broken JS — give up cleanly so a human can fix
              exit 1
            fi

            if git diff --staged --quiet; then
              echo "No changes to commit on attempt $attempt."
              exit 0
            fi
            git commit -m "📊 Weekly Intelligence Sync $(date +%Y-%m-%d) — Frontier Index + proprietary metrics refresh"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; soft-resetting and retrying"
            git reset --soft HEAD~1
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push weekly sync after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  health-summary:
    name: Weekly Sync Health
    runs-on: ubuntu-latest
    needs: [sync-weekly-metrics]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write data/data_health_weekly_sync.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          health = {
            "workflow": "weekly-intelligence-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "result": "${{ needs.sync-weekly-metrics.result }}",
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_weekly_sync.json", "w") as f:
              json.dump(health, f, indent=2)
          PY

      - name: Commit health (retry)
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"
          for attempt in 1 2 3 4 5; do
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main || true
            git stash pop 2>/dev/null || true
            git add data/data_health_weekly_sync.json
            if git diff --staged --quiet; then exit 0; fi
            git commit -m "🩺 Weekly intelligence sync health $(date +%Y-%m-%d)"
            if git push; then exit 0; fi
            git reset --soft HEAD~1
            sleep $((attempt * 5))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
