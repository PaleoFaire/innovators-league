name: Verify Company Facts (manual trigger)

# Multi-source fact verification pipeline. Manually triggered to avoid
# burning Claude budget on schedule. Each run processes one cohort
# (default: top 100 cold-email picks) and outputs a verification report
# Stephen reviews before any data.js changes are applied.

on:
  workflow_dispatch:
    inputs:
      cohort_file:
        description: 'JSON file with company names to verify (relative to repo)'
        default: 'data/cold_email_picks.json'
        required: true
      limit:
        description: 'Max companies to process (cost control, ~$0.10/co)'
        default: '100'
        required: true
      output_suffix:
        description: 'Suffix for output files (parallel-safe). e.g. "batch2"'
        default: ''
        required: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify cohort against public sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests anthropic

      - name: Run multi-source fact verifier
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY2 }}
          VERIFY_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          python scripts/verify_company_facts.py \
            --cohort-file "${{ github.event.inputs.cohort_file }}" \
            --limit "${{ github.event.inputs.limit }}" \
            --output-suffix "${{ github.event.inputs.output_suffix }}"

      - name: Generate human-readable report
        run: python scripts/generate_verification_report.py --suffix "${{ github.event.inputs.output_suffix }}"

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit verification artifacts (NOT data.js — stages for review)
        run: |
          # Per-suffix output files (parallel-safe; each run owns its files).
          # Cache files INTENTIONALLY EXCLUDED to avoid rebase conflicts in
          # parallel runs — they're just speedups, no need to share across.
          git add data/company_facts_verification*.json \
                  COMPANY_FACTS_VERIFICATION_REPORT*.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "📊 Company facts verification: ${{ github.event.inputs.cohort_file }} (limit ${{ github.event.inputs.limit }})"
          # Backup our commit's files in case rebase nukes them
          mkdir -p /tmp/verify_backup
          cp data/company_facts_verification*.json /tmp/verify_backup/ 2>/dev/null || true
          cp COMPANY_FACTS_VERIFICATION_REPORT*.md /tmp/verify_backup/ 2>/dev/null || true
          for attempt in 1 2 3 4 5; do
            # Refetch + check if we're still up to date
            git fetch origin main
            if git push origin HEAD:main 2>&1; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; recovering from backup + retrying"
            # Reset to clean main, then re-stage from backup
            git reset --hard origin/main
            cp /tmp/verify_backup/* data/ 2>/dev/null || true
            cp /tmp/verify_backup/COMPANY*.md . 2>/dev/null || true
            git add data/company_facts_verification*.json \
                    COMPANY_FACTS_VERIFICATION_REPORT*.md 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "Nothing to commit after recovery — main already has our state."
              exit 0
            fi
            git commit -m "📊 Company facts verification: ${{ github.event.inputs.cohort_file }} (limit ${{ github.event.inputs.limit }})"
            sleep $((attempt * 3))
          done
          echo "::error::Push failed after 5 retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
