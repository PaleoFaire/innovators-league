name: Daily Data Sync

on:
  schedule:
    # Run daily at 6 AM UTC (10 PM PST, 1 AM EST)
    - cron: '0 6 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-sec-filings:
    name: Sync SEC Filings
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch SEC filings
        run: python scripts/fetch_sec_filings.py

      - name: Upload SEC data artifact
        uses: actions/upload-artifact@v4
        with:
          name: sec-data
          path: |
            data/sec_filings_raw.json
            data/sec_filings_recent.json
            data/sec_filings_auto.js
          retention-days: 7

  sync-gov-contracts:
    name: Sync Government Contracts
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch USAspending data
        run: python scripts/fetch_usaspending.py

      - name: Upload Gov Contracts artifact
        uses: actions/upload-artifact@v4
        with:
          name: gov-contracts-data
          path: |
            data/gov_contracts_raw.json
            data/gov_contracts_aggregated.json
            data/gov_contracts_auto.js
          retention-days: 7

  sync-news:
    name: Sync News Signals
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch RSS news
        run: node scripts/aggregate_news.js

      - name: Upload News artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-data
          path: |
            data/news_raw.json
            data/news_signals_auto.js
          retention-days: 7

  merge-and-commit:
    name: Merge Data and Commit
    runs-on: ubuntu-latest
    needs: [sync-sec-filings, sync-gov-contracts, sync-news]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so `git pull --rebase` works when other workflows
          # have pushed commits ahead of us during our run.
          fetch-depth: 0

      - name: Download SEC data
        uses: actions/download-artifact@v4
        with:
          name: sec-data
          path: data/
        continue-on-error: true

      - name: Download Gov Contracts data
        uses: actions/download-artifact@v4
        with:
          name: gov-contracts-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download News data
        uses: actions/download-artifact@v4
        with:
          name: news-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Extract deal flow from news
        run: python scripts/fetch_deals.py

      - name: Calculate sector momentum scores
        run: python scripts/calc_sector_momentum.py

      - name: Detect IPO pipeline (SEC S-1 filings)
        run: python scripts/fetch_ipo_pipeline.py

      - name: Fetch revenue intel (SEC XBRL)
        run: python scripts/fetch_revenue_intel.py

      - name: Calculate growth signals
        run: python scripts/calc_growth_signals.py

      - name: Calculate funding tracker summaries
        run: python scripts/calc_funding_tracker.py

      - name: Calculate valuation benchmarks
        run: python scripts/calc_valuation_benchmarks.py

      - name: Calculate Innovator Scores (Frontier Index)
        run: python scripts/calc_innovator_scores.py

      - name: Calculate Predictive Scores
        run: python scripts/calc_predictive_scores.py

      - name: Estimate headcount from job data
        run: python scripts/calc_headcount_estimates.py

      - name: Clean stale placeholder data
        run: python scripts/clean_stale_data.py
        continue-on-error: true

      # Round 7l proprietary metrics — run daily so panels stay fresh
      # without waiting for the Sunday weekly sync. Each is independent
      # and safe to re-run; failures don't block the rest of the pipeline.
      - name: Fetch Substack field notes
        run: python scripts/fetch_substack_posts.py
        continue-on-error: true

      - name: Calc Contractor Readiness
        run: python scripts/calc_contractor_readiness.py
        continue-on-error: true

      - name: Calc Gov Demand Summary
        run: python scripts/calc_gov_demand_summary.py
        continue-on-error: true

      - name: Calc Budget Signals
        run: python scripts/calc_budget_signals.py
        continue-on-error: true

      - name: Calc Expert Takes
        run: python scripts/calc_expert_takes.py
        continue-on-error: true

      - name: Calc Fund Intelligence
        run: python scripts/calc_fund_intelligence.py
        continue-on-error: true

      - name: Calc Founder Mafias
        run: python scripts/calc_founder_mafias.py
        continue-on-error: true

      - name: Calc Network Graph
        run: python scripts/calc_network_graph.py
        continue-on-error: true

      - name: Calc M&A comps
        run: python scripts/calc_ma_comps.py
        continue-on-error: true

      - name: Emit Round 7l auto.js bundles
        run: python scripts/emit_round7l_auto_js.py

      - name: Merge all data into data.js
        run: python scripts/merge_data.py

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push changes (retry on conflict)
        run: |
          # Same robust pattern as comprehensive-data-sync: stash local
          # edits, rebase onto remote, pop stash, stage, commit, push.
          # On push failure, soft-reset and retry. Survives parallel commits
          # from other scheduled workflows without ever getting stuck mid-rebase.
          for attempt in 1 2 3 4 5; do
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main || {
              echo "Rebase failed on attempt $attempt; aborting"
              git rebase --abort 2>/dev/null || true
            }
            git stash pop 2>/dev/null || true
            git add data.js data/ 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No changes to commit on attempt $attempt."
              exit 0
            fi
            git commit -m "🤖 Auto-update: Daily data sync $(date +%Y-%m-%d)"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; soft-resetting and retrying"
            git reset --soft HEAD~1
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push daily data sync after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  data-health-summary:
    name: Data Health Summary
    runs-on: ubuntu-latest
    needs: [sync-sec-filings, sync-gov-contracts, sync-news, merge-and-commit]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write data/data_health_daily.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          steps = {
            "sec_filings":   "${{ needs.sync-sec-filings.result }}",
            "gov_contracts": "${{ needs.sync-gov-contracts.result }}",
            "news":          "${{ needs.sync-news.result }}",
            "merge_commit":  "${{ needs.merge-and-commit.result }}",
          }
          succeeded = [k for k, v in steps.items() if v == "success"]
          failed    = [k for k, v in steps.items() if v == "failure"]
          skipped   = [k for k, v in steps.items() if v in ("skipped", "cancelled", "")]

          health = {
            "workflow": "daily-data-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "steps": steps,
            "summary": {
              "total": len(steps),
              "succeeded": len(succeeded),
              "failed": len(failed),
              "skipped": len(skipped),
            },
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_daily.json", "w") as f:
              json.dump(health, f, indent=2)
          print(json.dumps(health["summary"], indent=2))
          PY

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit health file
        run: |
          git pull --rebase origin main || true
          git add data/data_health_daily.json
          git diff --staged --quiet || git commit -m "🩺 Daily sync health summary $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
