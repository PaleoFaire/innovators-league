name: Jobs & Stocks Sync

# Every 6h: pull Jobs (Greenhouse/Lever/Ashby/Workable) + Stock prices
# Single-job pattern — fetch + commit in the same runner so there's no
# artifact-marshalling layer to silently drop jobs_auto.js (historical bug).

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-commit:
    name: Fetch Jobs + Stocks and Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch jobs from company career pages
        run: python scripts/fetch_jobs.py
        continue-on-error: true

      - name: Fetch stock prices
        run: python scripts/fetch_stocks.py
        continue-on-error: true

      - name: Show data freshness (debug)
        run: |
          ls -la data/jobs_auto.js data/jobs_raw.json data/jobs_stats.json data/stocks_auto.js 2>/dev/null || true
          head -3 data/jobs_auto.js 2>/dev/null || true
          head -3 data/stocks_auto.js 2>/dev/null || true

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push (retry on conflict)
        run: |
          git add data/jobs_auto.js data/jobs_raw.json data/jobs_stats.json \
                  data/stocks_auto.js data/stocks_raw.json data/stocks_stats.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "🤖 Auto-update: Jobs & Stocks sync $(date +%Y-%m-%d\ %H:%M)"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing..."
            git pull --rebase origin main || true
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push jobs/stocks after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  data-health-summary:
    name: Data Health Summary
    runs-on: ubuntu-latest
    needs: [sync-and-commit]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write data/data_health_jobs_stocks.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          steps = {
            "sync_and_commit": "${{ needs.sync-and-commit.result }}",
          }
          succeeded = [k for k, v in steps.items() if v == "success"]
          failed    = [k for k, v in steps.items() if v == "failure"]
          skipped   = [k for k, v in steps.items() if v in ("skipped", "cancelled", "")]

          health = {
            "workflow": "jobs-stocks-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "steps": steps,
            "summary": {
              "total": len(steps),
              "succeeded": len(succeeded),
              "failed": len(failed),
              "skipped": len(skipped),
            },
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_jobs_stocks.json", "w") as f:
              json.dump(health, f, indent=2)
          PY

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit health file
        run: |
          git pull --rebase origin main || true
          git add data/data_health_jobs_stocks.json
          git diff --staged --quiet || git commit -m "🩺 Jobs/stocks sync health $(date +%Y-%m-%d\ %H:%M)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
