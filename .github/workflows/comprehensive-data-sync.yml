          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_arxiv_research.py
      - uses: actions/upload-artifact@v4
        with:
          name: arxiv-data
          path: data/
          retention-days: 7

  sync-clinical-trials:
