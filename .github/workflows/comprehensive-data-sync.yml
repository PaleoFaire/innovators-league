name: Comprehensive Data Sync

# Runs all data fetchers daily at 7 AM UTC
# Previously split into daily/weekly but the weekly condition was broken,
# so all fetchers now run daily for reliable data freshness.

on:
  schedule:
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Type of sync to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - daily-only
          - research-only

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════
  # HIGH-FREQUENCY SOURCES
  # ═══════════════════════════════════════════════════════════

  sync-hackernews:
    name: Sync Hacker News Buzz
    runs-on: ubuntu-latest
    if: github.event.inputs.sync_type != 'research-only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_hackernews.py
      - uses: actions/upload-artifact@v4
        with:
          name: hackernews-data
          path: data/
          retention-days: 7

  sync-press-releases:
    name: Sync Press Releases
    runs-on: ubuntu-latest
    if: github.event.inputs.sync_type != 'research-only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_press_releases.py
      - uses: actions/upload-artifact@v4
        with:
          name: press-releases-data
          path: data/
          retention-days: 7

  sync-federal-register:
    name: Sync Federal Register
    runs-on: ubuntu-latest
    if: github.event.inputs.sync_type != 'research-only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
