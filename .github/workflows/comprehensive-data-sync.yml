  # ═══════════════════════════════════════════════════════════
  # MERGE AND COMMIT - Runs after all fetchers complete
  # ═══════════════════════════════════════════════════════════

  merge-all-data:
    name: Merge All Data
    runs-on: ubuntu-latest
    needs: [sync-hackernews, sync-press-releases, sync-federal-register, sync-arxiv, sync-clinical-trials, sync-nsf-grants, sync-doe-energy, sync-nasa, sync-congress-bills, sync-sbir-topics, sync-demand-signals, sync-nrc-licensing, sync-faa-certification, sync-sam-contracts, sync-census-trade, sync-sbir-awards, sync-nih-grants, sync-arpa-e, sync-diffbot, sync-vc-portfolios]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-data/
          merge-multiple: true

      - name: Copy data files
        run: |
          mkdir -p data/
          cp -r downloaded-data/* data/ 2>/dev/null || true

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push
        run: |
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Auto-update: Comprehensive data sync $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
