name: Weekly Patent Sync

on:
  schedule:
    # Run every Sunday at 8 AM UTC
    - cron: '0 8 * * 0'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-patents:
    name: Sync USPTO Patents
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch USPTO patent data
        run: python scripts/fetch_patents.py
        env:
          PATENTSVIEW_API_KEY: ${{ secrets.PATENTSVIEW_API_KEY }}

      - name: Merge patent data into data.js
        run: python scripts/merge_data.py

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push changes
        run: |
          git add data.js data/
          git diff --staged --quiet || git commit -m "🤖 Auto-update: Weekly patent sync $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  data-health-summary:
    name: Data Health Summary
    runs-on: ubuntu-latest
    needs: [sync-patents]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write data/data_health_weekly_patent.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          steps = {"patent_sync": "${{ needs.sync-patents.result }}"}
          health = {
            "workflow": "weekly-patent-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "steps": steps,
            "summary": {
              "total": 1,
              "succeeded": 1 if steps["patent_sync"] == "success" else 0,
              "failed":    1 if steps["patent_sync"] == "failure" else 0,
            },
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_weekly_patent.json", "w") as f:
              json.dump(health, f, indent=2)
          PY

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit health file
        run: |
          git pull --rebase origin main || true
          git add data/data_health_weekly_patent.json
          git diff --staged --quiet || git commit -m "🩺 Weekly patent sync health $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
