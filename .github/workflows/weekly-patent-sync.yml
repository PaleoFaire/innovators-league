name: Weekly Patent Sync

on:
  schedule:
    # Run every Sunday at 8 AM UTC
    - cron: '0 8 * * 0'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-patents:
    name: Sync USPTO Patents
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch USPTO patent data
        run: python scripts/fetch_patents.py
        env:
          PATENTSVIEW_API_KEY: ${{ secrets.PATENTSVIEW_API_KEY }}

      - name: Merge patent data into data.js
        run: python scripts/merge_data.py

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push (retry on conflict)
        run: |
          git add data.js data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "🤖 Auto-update: Weekly patent sync $(date +%Y-%m-%d)"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing..."
            git pull --rebase origin main || true
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push patents after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  data-health-summary:
    name: Data Health Summary
    runs-on: ubuntu-latest
    needs: [sync-patents]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write data/data_health_weekly_patent.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          steps = {"patent_sync": "${{ needs.sync-patents.result }}"}
          health = {
            "workflow": "weekly-patent-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "steps": steps,
            "summary": {
              "total": 1,
              "succeeded": 1 if steps["patent_sync"] == "success" else 0,
              "failed":    1 if steps["patent_sync"] == "failure" else 0,
            },
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_weekly_patent.json", "w") as f:
              json.dump(health, f, indent=2)
          PY

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit health file (retry on conflict)
        run: |
          for attempt in 1 2 3 4 5; do
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main || true
            git stash pop 2>/dev/null || true
            git add data/data_health_weekly_patent.json
            if git diff --staged --quiet; then
              echo "No changes to commit."
              exit 0
            fi
            git commit -m "🩺 Weekly patent sync health $(date +%Y-%m-%d)"
            if git push; then exit 0; fi
            git reset --soft HEAD~1
            sleep $((attempt * 5))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
