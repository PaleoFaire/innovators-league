name: Weekly Extended Data Sync

on:
  schedule:
    # Run every Sunday at 9 AM UTC (after patent sync)
    - cron: '0 9 * * 0'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-insider-trading:
    name: Sync SEC Form 4 Insider Trading
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch insider trading data
        run: python scripts/fetch_insider_trading.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: insider-data
          path: data/
          retention-days: 7

  sync-fda-approvals:
    name: Sync FDA Approvals
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch FDA data
        run: python scripts/fetch_fda_approvals.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fda-data
          path: data/
          retention-days: 7

  sync-github-releases:
    name: Sync GitHub Releases
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch GitHub releases
        run: python scripts/fetch_github_releases.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-releases-data
          path: data/
          retention-days: 7

  sync-product-hunt:
    name: Sync Product Hunt Launches
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Product Hunt launches
        run: python scripts/fetch_product_hunt.py
        env:
          PRODUCTHUNT_API_TOKEN: ${{ secrets.PRODUCTHUNT_API_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-hunt-data
          path: data/
          retention-days: 7

  sync-linkedin-headcount:
    name: Sync LinkedIn Headcount (Apify)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch LinkedIn company headcount
        # Real LinkedIn employee counts + 90-day growth per tracked company.
        # No-op (writes `awaiting_apify_key` placeholders) until APIFY_TOKEN
        # is set in repo secrets.
        run: python scripts/fetch_linkedin_headcount.py
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-headcount-data
          path: data/
          retention-days: 7

  sync-trademarks:
    name: Sync USPTO Trademarks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Fetch USPTO trademark filings
        # Graceful no-op (writes placeholder) when USPTO_API_KEY is unset.
        # Get free key at https://developer.uspto.gov/api-catalog
        run: python scripts/fetch_trademarks.py
        env:
          USPTO_API_KEY: ${{ secrets.USPTO_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: trademarks-data
          path: data/
          retention-days: 7

  sync-factory-watch:
    name: Sync Factory Watch (ESA Copernicus)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Fetch Sentinel-2 satellite passes over watched sites
        # FREE public API via Copernicus Data Space Ecosystem (no key).
        run: python scripts/fetch_factory_watch.py
      - uses: actions/upload-artifact@v4
        with:
          name: factory-watch-data
          path: data/
          retention-days: 7

  sync-exec-moves:
    name: Sync Executive Moves (C-suite / board changes)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Detect CEO / CFO / CTO / board changes from SEC 8-K + Form 4
        # Parses data/sec_filings_raw.json for Item 5.02 (officer appointments)
        # and Form 4 new-officer transactions; falls back to a curated seed
        # of well-documented frontier-tech exec moves. This is the next class
        # of drift after rebrands/acquisitions — catches "CEO change at X"
        # events that no other pipeline surfaces.
        run: python scripts/fetch_exec_moves.py
      - uses: actions/upload-artifact@v4
        with:
          name: exec-moves-data
          path: data/
          retention-days: 7

  sync-darpa-programs:
    name: Sync DARPA Performer Map (USAspending)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Fetch DARPA contracts from USAspending API (5-year window)
        # Powers the DARPA Performer Map on govradar.html. Pulls every
        # contract awarded by Defense Advanced Research Projects Agency,
        # clusters by program tag, and matches recipients to ROS roster.
        # Updates data/darpa_programs_auto.{json,js}.
        run: python scripts/fetch_darpa_programs.py
      - uses: actions/upload-artifact@v4
        with:
          name: darpa-data
          path: data/
          retention-days: 7

  sync-discovery-queue:
    name: Build Discovery Queue (frontier-tech candidates not yet in DB)
    runs-on: ubuntu-latest
    continue-on-error: true
    # Runs after sync-vc-portfolios + comprehensive-data-sync produces
    # form_d_filings_auto.json. By placing in weekly-extended-sync, we
    # accept that discovery refreshes weekly — fine for a triage queue.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Pull elite newsletter RSS feeds (8 sources)
        # Curated list of frontier-tech newsletters: Vance, Newcomer,
        # Latent Space, Construction Physics, Generalist, Strange Loop,
        # Not Boring, Asianometry, Bismarck Brief.
        run: python scripts/fetch_newsletter_signals.py
      - name: Build discovery queue (combine Form D + VC + newsletter signals)
        # Aggregates SEC Form D filings + 16 VC portfolio diffs + 8
        # newsletter mentions. De-dupes against existing 869 companies in
        # data.js. Outputs data/discovery_queue_auto.{json,js} with
        # confidence labels (high/medium/low) for the review UI.
        run: python scripts/build_discovery_queue.py
      - uses: actions/upload-artifact@v4
        with:
          name: discovery-data
          path: data/
          retention-days: 7

  merge-and-commit:
    name: Merge Extended Data and Commit
    runs-on: ubuntu-latest
    needs: [sync-insider-trading, sync-fda-approvals, sync-github-releases, sync-product-hunt, sync-linkedin-headcount, sync-trademarks, sync-factory-watch, sync-exec-moves, sync-darpa-programs, sync-discovery-queue]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so `git pull --rebase` works when other workflows
          # push during our 20-min fan-out run.
          fetch-depth: 0

      - name: Download insider data
        uses: actions/download-artifact@v4
        with:
          name: insider-data
          path: data/
        continue-on-error: true

      - name: Download FDA data
        uses: actions/download-artifact@v4
        with:
          name: fda-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download GitHub releases data
        uses: actions/download-artifact@v4
        with:
          name: github-releases-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download Product Hunt data
        uses: actions/download-artifact@v4
        with:
          name: product-hunt-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download LinkedIn headcount data
        uses: actions/download-artifact@v4
        with:
          name: linkedin-headcount-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download Trademarks data
        uses: actions/download-artifact@v4
        with:
          name: trademarks-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download Factory Watch data
        uses: actions/download-artifact@v4
        with:
          name: factory-watch-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download Executive Moves data
        uses: actions/download-artifact@v4
        with:
          name: exec-moves-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download DARPA programs data
        uses: actions/download-artifact@v4
        with:
          name: darpa-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Download discovery queue data
        uses: actions/download-artifact@v4
        with:
          name: discovery-data
          path: data/
          merge-multiple: true
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate Founder DNA Index
        run: python scripts/generate_founder_dna.py

      - name: Pipeline Health Watchdog
        # Emit data/pipeline_health.json so the site footer and admin
        # dashboard always have an up-to-date freshness picture.
        run: python scripts/pipeline_watchdog.py
        continue-on-error: true

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push changes (retry on conflict)
        run: |
          # Robust stash-rebase-pop-commit pattern. Previous version used
          # `git pull --rebase origin main || true` which silently swallowed
          # rebase conflicts, leaving the repo stuck and the push failing
          # without any error surfaced. That's why FDA/insider/github
          # outputs went 50-65 days stale while this workflow reported
          # "success" every Sunday.
          for attempt in 1 2 3 4 5; do
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main || {
              echo "Rebase failed on attempt $attempt; aborting cleanly"
              git rebase --abort 2>/dev/null || true
            }
            git stash pop 2>/dev/null || true
            git add data/ data.js 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "No changes to commit on attempt $attempt."
              exit 0
            fi
            # ── CONFLICT-MARKER GUARD ──
            # Refuse to commit any file that contains an unresolved git
            # conflict marker. Caught by the regression that broke the
            # homepage in Apr 2026 (commit 96e92bf).
            if grep -RIlE '^<{7}|^>{7}|^={7}$' data.js data/ 2>/dev/null | head -1 | grep -q .; then
              echo "::error::Conflict markers detected in tracked files. Refusing to commit."
              grep -RIlE '^<{7}|^>{7}|^={7}$' data.js data/ 2>/dev/null
              exit 1
            fi
            git commit -m "🤖 Auto-update: Weekly extended sync (FDA, Insider, GitHub, PH, Founder DNA) $(date +%Y-%m-%d)"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; soft-resetting and retrying"
            git reset --soft HEAD~1
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push weekly extended sync after 5 attempts"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  data-health-summary:
    name: Data Health Summary
    runs-on: ubuntu-latest
    needs: [sync-insider-trading, sync-fda-approvals, sync-github-releases, sync-product-hunt, sync-darpa-programs, sync-discovery-queue, merge-and-commit]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write data/data_health_weekly_extended.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          steps = {
            "insider_trading": "${{ needs.sync-insider-trading.result }}",
            "fda_approvals":   "${{ needs.sync-fda-approvals.result }}",
            "github_releases": "${{ needs.sync-github-releases.result }}",
            "product_hunt":    "${{ needs.sync-product-hunt.result }}",
            "darpa_programs":  "${{ needs.sync-darpa-programs.result }}",
            "discovery_queue": "${{ needs.sync-discovery-queue.result }}",
            "merge_commit":    "${{ needs.merge-and-commit.result }}",
          }
          succeeded = [k for k, v in steps.items() if v == "success"]
          failed    = [k for k, v in steps.items() if v == "failure"]
          skipped   = [k for k, v in steps.items() if v in ("skipped", "cancelled", "")]

          health = {
            "workflow": "weekly-extended-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "steps": steps,
            "summary": {
              "total": len(steps),
              "succeeded": len(succeeded),
              "failed": len(failed),
              "skipped": len(skipped),
            },
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_weekly_extended.json", "w") as f:
              json.dump(health, f, indent=2)
          PY

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit health file
        run: |
          git pull --rebase origin main || true
          git add data/data_health_weekly_extended.json
          git diff --staged --quiet || git commit -m "🩺 Weekly extended sync health $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
