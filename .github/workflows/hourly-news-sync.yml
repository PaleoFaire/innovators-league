name: Hourly News Sync

on:
  schedule:
    # Run hourly at :07 for Bloomberg-grade freshness
    - cron: '7 * * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-news:
    name: Sync News Signals
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch RSS news
        run: node scripts/aggregate_news.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update COMPANY_SIGNALS in data.js
        run: |
          python3 << 'EOF'
          import json
          import re
          from datetime import datetime
          from pathlib import Path

          # Read news data
          news_path = Path("data/news_raw.json")
          if not news_path.exists():
              print("No news data found")
              exit(0)

          with open(news_path) as f:
              signals = json.load(f)

          if not signals:
              print("No signals to update")
              exit(0)

          # Read data.js
          with open("data.js") as f:
              content = f.read()

          # Generate new COMPANY_SIGNALS
          js_array = "// Auto-generated real-time signals\n"
          js_array += f"// Last updated: {datetime.now().strftime('%Y-%m-%d %H:%M')}\n"
          js_array += "const COMPANY_SIGNALS = [\n"

          for i, s in enumerate(signals[:15]):
              headline = s.get("title", "")[:120]
              # Sanitize HTML entities and special characters
              # Replace all quote variants with safe single quotes
              headline = headline.replace('&#8216;', "'").replace('&#8217;', "'")
              headline = headline.replace('&#039;', "'").replace('&amp;', '&')
              headline = headline.replace('\u201c', "'").replace('\u201d', "'")  # Curly double quotes
              headline = headline.replace('\u2018', "'").replace('\u2019', "'")  # Curly single quotes
              headline = headline.replace('"', "'").replace('\n', ' ').replace('\r', ' ')
              # Remove any other potentially problematic characters
              headline = ''.join(c if ord(c) < 128 or c == "'" else "'" for c in headline)
              js_array += f'  {{ id: {i+1}, type: "{s.get("type", "news")}", '
              js_array += f'company: "{s.get("matchedCompany", "")}", '
              js_array += f'headline: "{headline}", '
              js_array += f'source: "{s.get("source", "")}", '
              js_array += f'time: "{s.get("time", "")}", '
              js_array += f'impact: "{s.get("impact", "medium")}", '
              js_array += f'unread: {"true" if i < 5 else "false"} }},\n'

          js_array += "];"

          # Replace in content
          pattern = r'// Auto-generated real-time signals[\s\S]*?const COMPANY_SIGNALS = \[[\s\S]*?\];'
          if re.search(pattern, content):
              content = re.sub(pattern, js_array, content)
          else:
              pattern = r'const COMPANY_SIGNALS = \[[\s\S]*?\];'
              if re.search(pattern, content):
                  content = re.sub(pattern, js_array, content)

          with open("data.js", "w") as f:
              f.write(content)

          print(f"Updated COMPANY_SIGNALS with {min(len(signals), 15)} items")
          EOF

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit and push changes
        run: |
          git add data.js data/
          git diff --staged --quiet || git commit -m "🤖 Auto-update: News signals $(date +%Y-%m-%d\ %H:%M)"
          git pull --rebase origin main || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  data-health-summary:
    name: Data Health Summary
    runs-on: ubuntu-latest
    needs: [sync-news]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write data/data_health_hourly.json
        run: |
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone

          steps = {"news_sync": "${{ needs.sync-news.result }}"}
          health = {
            "workflow": "hourly-news-sync",
            "generated_at": datetime.now(timezone.utc).isoformat(),
            "steps": steps,
            "summary": {
              "total": 1,
              "succeeded": 1 if steps["news_sync"] == "success" else 0,
              "failed":    1 if steps["news_sync"] == "failure" else 0,
            },
          }
          os.makedirs("data", exist_ok=True)
          with open("data/data_health_hourly.json", "w") as f:
              json.dump(health, f, indent=2)
          PY

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      - name: Commit health file
        run: |
          git pull --rebase origin main || true
          git add data/data_health_hourly.json
          git diff --staged --quiet || git commit -m "🩺 Hourly sync health $(date +%Y-%m-%d\ %H:%M)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
