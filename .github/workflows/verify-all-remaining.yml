          python3 -c "
          import re
          src = open('data.js').read()
          assert 'const COMPANIES' in src
          assert src.count('{') == src.count('}')
          print('✓ sanity check passed')
          "
          git add data.js \
                  data/company_facts_verification_batch7.json \
                  COMPANY_FACTS_VERIFICATION_REPORT_batch7.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "📊 Batch 7 verified + auto-applied (95 cos)"
            for attempt in 1 2 3; do
              git pull --rebase -X theirs origin main 2>/dev/null || true
              if git push; then break; fi
              sleep 5
            done
          fi

      # ─── BATCH 8 ──────────────────────────────────────────────
      - name: Batch 8 — Verify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY2 }}
          VERIFY_LIMIT: '95'
        continue-on-error: true
        run: |
          python scripts/verify_company_facts.py \
            --cohort-file data/cold_email_batch8.json \
            --limit 95 --output-suffix batch8
          python scripts/generate_verification_report.py --suffix batch8

      - name: Batch 8 — Auto-apply + commit
        continue-on-error: true
        run: |
          python scripts/auto_apply_verified.py --suffix batch8
          python3 -c "
          import re
          src = open('data.js').read()
          assert 'const COMPANIES' in src
          assert src.count('{') == src.count('}')
          print('✓ sanity check passed')
          "
          git add data.js \
                  data/company_facts_verification_batch8.json \
                  COMPANY_FACTS_VERIFICATION_REPORT_batch8.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "📊 Batch 8 verified + auto-applied (95 cos)"
            for attempt in 1 2 3; do
              git pull --rebase -X theirs origin main 2>/dev/null || true
              if git push; then break; fi
              sleep 5
            done
          fi

      # ─── BATCH 9 ──────────────────────────────────────────────
      - name: Batch 9 — Verify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY2 }}
          VERIFY_LIMIT: '95'
        continue-on-error: true
        run: |
          python scripts/verify_company_facts.py \
            --cohort-file data/cold_email_batch9.json \
            --limit 95 --output-suffix batch9
          python scripts/generate_verification_report.py --suffix batch9

      - name: Batch 9 — Auto-apply + commit
        continue-on-error: true
        run: |
          python scripts/auto_apply_verified.py --suffix batch9
