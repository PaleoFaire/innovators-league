          print('✓ sanity check passed')
          "
          git add data.js \
                  data/company_facts_verification_batch9.json \
                  COMPANY_FACTS_VERIFICATION_REPORT_batch9.md 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "📊 Batch 9 verified + auto-applied (95 cos) — 100% COVERAGE"
            for attempt in 1 2 3; do
              git pull --rebase -X theirs origin main 2>/dev/null || true
              if git push; then break; fi
              sleep 5
            done
          fi

      # ─── FINAL SUMMARY ────────────────────────────────────────
      - name: Final summary
        if: always()
        run: |
          echo "==============================================="
          echo "VERIFICATION CHAIN COMPLETE"
          echo "==============================================="
          for b in 4 5 6 7 8 9; do
            f="data/company_facts_verification_batch${b}.json"
            if [ -f "$f" ]; then
              echo
              echo "Batch $b:"
              python3 -c "
              import json
              d = json.load(open('$f'))
              s = d.get('summary',{})
              print(f'  cohort: {d.get(\"cohortSize\",0)}')
              print(f'  cleared: {s.get(\"cleared\",0)}')
              print(f'  changes: {s.get(\"changesProposed\",0)}')
              print(f'  unverifiable: {s.get(\"unverifiable\",0)}')
              print(f'  cost: ~\${d.get(\"newExtractionsThisRun\",0)*0.05:.2f}')
              "
            else
              echo "Batch $b: did not complete"
            fi
          done
