name: Verify All Remaining (hardened, batches 4-9)

# HARDENED — fixes that prevent silent data loss seen in chain run 25146250695,
# where ALL 6 batches' push attempts failed and the broken retry loop
# ate the failures:
#   1. Push failures no longer silent — exit 1 if all retries fail
#      (previous: 3-attempt loop with no exit code, then continue-on-error
#      caused step to "succeed" while losing all data).
#   2. Verification JSON uploaded as workflow artifact BEFORE push attempt
#      so verify work is recoverable even if the commit/push fails entirely.
#   3. Each batch step verifies the JSON exists + is valid before staging.
#   4. Uses verify-company-facts.yml's proven push pattern (5 attempts,
#      explicit `git fetch + reset + recommit + push HEAD:main`, no rebase).
#   5. continue-on-error retained ONLY on the verify steps (so a single
#      cohort's API failure doesn't abort the chain) — NOT on commit steps.
#   6. `batches` input lets you re-run only the cohorts that failed.

on:
  workflow_dispatch:
    inputs:
      batches:
        description: 'Comma-separated batches to run (default 4,5,6,7,8,9)'
        default: '4,5,6,7,8,9'
        required: true
      limit:
        description: 'Max companies per batch (default 95)'
        default: '95'
        required: true

concurrency:
  group: verify-chain
  cancel-in-progress: false   # don't cancel a running chain

permissions:
  contents: write

jobs:
  verify-and-apply-all:
    name: Verify + auto-apply selected cohorts (hardened)
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      LIMIT: ${{ github.event.inputs.limit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests anthropic

      - name: Configure Git
        run: |
          git config user.name "TIL Data Bot"
          git config user.email "bot@innovatorsleague.com"

      # ─── BATCH 4 ──────────────────────────────────────────────
      - name: Batch 4 — Verify
        if: contains(github.event.inputs.batches, '4')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY2 }}
          VERIFY_LIMIT: ${{ env.LIMIT }}
        continue-on-error: true   # API failures shouldn't kill chain
        run: |
          set -euo pipefail
          python scripts/verify_company_facts.py \
            --cohort-file data/cold_email_batch4.json \
            --limit "$LIMIT" --output-suffix batch4
          python scripts/generate_verification_report.py --suffix batch4
          # Sanity: file exists and has changesProposed key
          test -s data/company_facts_verification_batch4.json
          python3 -c "import json,sys; d=json.load(open('data/company_facts_verification_batch4.json')); assert 'changesProposed' in d or d.get('skipped'), 'malformed verifier output'"

      - name: Batch 4 — Upload artifact (pre-push backup)
        if: contains(github.event.inputs.batches, '4')
        uses: actions/upload-artifact@v4
        with:
          name: verification-batch4
          path: |
            data/company_facts_verification_batch4.json
            COMPANY_FACTS_VERIFICATION_REPORT_batch4.md
          if-no-files-found: warn
          retention-days: 30

      - name: Batch 4 — Auto-apply + commit
        if: contains(github.event.inputs.batches, '4')
        run: |
          set -euo pipefail
          bash scripts/commit_batch.sh batch4

      # ─── BATCH 5 ──────────────────────────────────────────────
      - name: Batch 5 — Verify
        if: contains(github.event.inputs.batches, '5')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY2 }}
          VERIFY_LIMIT: ${{ env.LIMIT }}
        continue-on-error: true
